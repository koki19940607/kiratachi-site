<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>キラキラ橘商店街 地図プロトタイプ</title>
  <style>
    :root {
      --bg: #f8f2ea;
      --text: #2d2621;
      --sub: #6b625a;
      --line: #ead8c8;
      --road: #d9c4ab;
      --road-2: #ccb190;
      --block: #fff8f0;
      --block-line: #efd9c7;
      --open: #2f9e44;
      --closed: #8b837b;
      --check: #c77d00;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    .app { max-width: 430px; margin: 0 auto; padding: 18px 14px 40px; }
    h1 { font-size: 24px; margin: 0 0 8px; }
    .lead { color: var(--sub); font-size: 13px; line-height: 1.6; margin: 0 0 14px; }
    .map-wrap {
      position: relative; width: 100%; height: 860px; background: linear-gradient(180deg, #fffaf4, #fff2e5);
      border: 1px solid var(--line); border-radius: 24px; overflow: hidden; box-shadow: 0 14px 36px rgba(84, 48, 21, 0.08);
    }
    .block { position: absolute; background: var(--block); border: 1px solid var(--block-line); border-radius: 16px; }
    .road { position: absolute; background: linear-gradient(180deg, var(--road), var(--road-2)); border: 2px solid rgba(116, 83, 53, 0.14); border-radius: 20px; }
    .road::after { content: ''; position: absolute; inset: 7px; border-radius: 14px; border: 2px dashed rgba(255,255,255,0.42); }
    .road.main {
      left: 37%; top: 12%; width: 22%; height: 70%; transform: rotate(24deg); transform-origin: center center;
    }
    .road.vertical-east { left: 70%; top: 18%; width: 12%; height: 68%; }
    .road.cross-a { left: 12%; top: 17%; width: 62%; height: 5%; transform: rotate(-28deg); }
    .road.cross-b { left: 18%; top: 33%; width: 52%; height: 5%; transform: rotate(-32deg); }
    .road.cross-c { left: 16%; top: 50%; width: 60%; height: 5%; transform: rotate(-24deg); }
    .road.cross-d { left: 20%; top: 66%; width: 58%; height: 5%; transform: rotate(-18deg); }
    .road.cross-e { left: 28%; top: 78%; width: 48%; height: 5%; transform: rotate(-10deg); }
    .zone-label {
      position: absolute; font-size: 11px; font-weight: 800; color: #7b593f; background: rgba(255,255,255,0.92);
      border: 1px solid #edd3be; padding: 6px 10px; border-radius: 999px;
    }
    .zone-1 { left: 56%; top: 9%; }
    .zone-2 { left: 40%; top: 43%; }
    .zone-3 { left: 48%; top: 79%; }
    .shop {
      position: absolute; width: 104px; min-height: 38px; padding: 7px 8px; border-radius: 12px; background: rgba(255,255,255,0.96);
      border: 1px solid #ead8c8; box-shadow: 0 6px 12px rgba(84, 48, 21, 0.08); font-size: 10px; line-height: 1.35; text-align: left;
    }
    .shop::before { content: ''; position: absolute; top: 50%; width: 16px; border-top: 2px dashed #c9a27e; }
    .shop.left::before { right: -16px; }
    .shop.right::before { left: -16px; }
    .shop strong { display: block; font-size: 10px; margin-bottom: 2px; }
    .open { border-color: rgba(47,158,68,0.35); }
    .closed { border-color: rgba(139,131,123,0.35); }
    .maybe { border-color: rgba(199,125,0,0.35); }
    .legend { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
    .legend span { font-size: 11px; color: var(--sub); background: #fff; border: 1px solid var(--line); border-radius: 999px; padding: 6px 10px; }
  </style>
</head>
<body>
  <div class="app">
    <h1>商店街地図プロトタイプ</h1>
    <p class="lead">Googleマップのスクショを見ながら、主通路を斜め軸にして枝道を追加した試作です。まだ仮ですが、一本道ではなく複数の道と店の並びを前提にしています。</p>
    <div class="map-wrap" id="mapWrap">
      <div class="block" style="left:4%;top:8%;width:24%;height:18%"></div>
      <div class="block" style="left:8%;top:30%;width:20%;height:20%"></div>
      <div class="block" style="left:7%;top:54%;width:23%;height:18%"></div>
      <div class="block" style="left:12%;top:76%;width:24%;height:16%"></div>
      <div class="block" style="left:66%;top:8%;width:26%;height:16%"></div>
      <div class="block" style="left:63%;top:30%;width:29%;height:16%"></div>
      <div class="block" style="left:61%;top:50%;width:31%;height:16%"></div>
      <div class="block" style="left:60%;top:70%;width:30%;height:20%"></div>
      <div class="block" style="left:31%;top:24%;width:18%;height:12%"></div>
      <div class="block" style="left:30%;top:60%;width:18%;height:14%"></div>

      <div class="road main"></div>
      <div class="road vertical-east"></div>
      <div class="road cross-a"></div>
      <div class="road cross-b"></div>
      <div class="road cross-c"></div>
      <div class="road cross-d"></div>
      <div class="road cross-e"></div>

      <div class="zone-label zone-1">入口付近</div>
      <div class="zone-label zone-2">中央あたり</div>
      <div class="zone-label zone-3">奥のほう</div>
    </div>
    <div class="legend">
      <span>緑: 営業中</span>
      <span>灰: 営業時間外</span>
      <span>黄: 要確認</span>
    </div>
  </div>
  <script>
    let shops = [];
    const mapWrap = document.getElementById('mapWrap');
    fetch('./shops.json', { cache: 'no-store' }).then(r => r.json()).then(data => { shops = data; render(); });
    function stateClass(shop) {
      if (!shop.hours || shop.hours.includes('調査中') || (shop.note || '').includes('要確認')) return 'maybe';
      return 'closed';
    }
    function render() {
      shops.forEach(shop => {
        if (shop.mapX == null || shop.mapY == null) return;
        const el = document.createElement('button');
        el.className = `shop ${shop.mapLabelSide || 'right'} ${stateClass(shop)}`;
        el.style.left = `calc(${shop.mapX}% - 52px)`;
        el.style.top = `calc(${shop.mapY}% - 18px)`;
        el.innerHTML = `<strong>${shop.name}</strong><span>${shop.genre}</span>`;
        el.title = `${shop.name}\n${shop.hours}\n${shop.closed}`;
        mapWrap.appendChild(el);
      });
    }
  </script>
</body>
</html>
