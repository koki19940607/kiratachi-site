<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>キラキラ橘商店街 地図プロトタイプ</title>
  <style>
    :root {
      --bg: #f4ecdf;
      --paper: #fbf4e8;
      --ink: #5a4635;
      --sub: #7b6858;
      --accent: #d26b43;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .app {
      max-width: 430px;
      margin: 0 auto;
      padding: 18px 14px 40px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 24px;
      line-height: 1.3;
    }
    .lead {
      margin: 0 0 14px;
      color: var(--sub);
      font-size: 13px;
      line-height: 1.7;
    }
    .paper {
      background: radial-gradient(circle at 20% 20%, rgba(255,255,255,0.35), transparent 18%),
                  radial-gradient(circle at 80% 30%, rgba(255,255,255,0.28), transparent 18%),
                  radial-gradient(circle at 30% 80%, rgba(255,255,255,0.22), transparent 16%),
                  var(--paper);
      border-radius: 28px;
      border: 1px solid rgba(192, 162, 129, 0.4);
      box-shadow: 0 16px 36px rgba(88, 56, 30, 0.08);
      overflow: hidden;
    }
    .map-frame {
      width: 100%;
      display: block;
    }
    .legend {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
    }
    .legend span {
      font-size: 11px;
      color: var(--sub);
      background: rgba(255,255,255,0.75);
      border: 1px solid rgba(206,182,154,0.5);
      border-radius: 999px;
      padding: 6px 10px;
    }
  </style>
</head>
<body>
  <div class="app">
    <h1>商店街地図プロトタイプ</h1>
    <p class="lead">図形を並べるのではなく、画用紙に描かれた案内図の雰囲気に寄せた試作です。まずは地形とランドマークを絵として見せる方向に振っています。</p>

    <div class="paper">
      <svg class="map-frame" viewBox="0 0 430 980" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="キラキラ橘商店街のイラスト地図プロトタイプ">
        <defs>
          <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#8b6a48" flood-opacity="0.10"/>
          </filter>
          <filter id="roughen">
            <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="1" seed="3" result="noise"/>
            <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.5" xChannelSelector="R" yChannelSelector="G"/>
          </filter>
        </defs>

        <rect x="0" y="0" width="430" height="980" fill="#fbf4e8"/>

        <!-- river -->
        <path d="M350 10 C380 120, 392 250, 387 380 C383 500, 396 635, 398 770 C399 860, 392 930, 386 980 L430 980 L430 0 Z"
              fill="#d8eef5" stroke="#8ec1d3" stroke-width="3" filter="url(#roughen)"/>
        <path d="M363 120 C370 220, 370 340, 368 450 C367 560, 372 690, 374 830" fill="none" stroke="#effbff" stroke-width="4" stroke-linecap="round" opacity="0.7"/>

        <!-- parks / green -->
        <path d="M295 470 C330 452, 360 455, 384 478 C382 515, 360 545, 315 548 C294 529, 288 499, 295 470 Z"
              fill="#dff0db" stroke="#97bb8e" stroke-width="3" filter="url(#roughen)"/>
        <path d="M38 518 C62 505, 90 508, 112 528 C110 557, 86 580, 44 578 C30 560, 28 536, 38 518 Z"
              fill="#e5f1de" stroke="#9dc08f" stroke-width="3" filter="url(#roughen)"/>

        <!-- hand-drawn roads -->
        <path d="M206 92 C226 126, 240 170, 247 226 C254 282, 250 344, 246 406 C242 474, 250 548, 264 620 C278 694, 287 778, 289 868"
              fill="none" stroke="#d8b68f" stroke-width="56" stroke-linecap="round" stroke-linejoin="round" filter="url(#roughen)"/>
        <path d="M206 92 C226 126, 240 170, 247 226 C254 282, 250 344, 246 406 C242 474, 250 548, 264 620 C278 694, 287 778, 289 868"
              fill="none" stroke="#f8e6cb" stroke-width="40" stroke-linecap="round" stroke-linejoin="round" filter="url(#roughen)"/>

        <path d="M76 184 C126 176, 174 170, 226 158" fill="none" stroke="#f1ddc1" stroke-width="28" stroke-linecap="round" filter="url(#roughen)"/>
        <path d="M104 316 C150 308, 194 300, 244 288" fill="none" stroke="#f1ddc1" stroke-width="26" stroke-linecap="round" filter="url(#roughen)"/>
        <path d="M70 466 C128 456, 184 446, 240 434" fill="none" stroke="#f1ddc1" stroke-width="28" stroke-linecap="round" filter="url(#roughen)"/>
        <path d="M116 636 C172 628, 220 620, 274 610" fill="none" stroke="#f1ddc1" stroke-width="24" stroke-linecap="round" filter="url(#roughen)"/>
        <path d="M154 814 C204 808, 246 804, 292 800" fill="none" stroke="#f1ddc1" stroke-width="22" stroke-linecap="round" filter="url(#roughen)"/>
        <path d="M292 430 C326 426, 354 422, 382 420" fill="none" stroke="#f1ddc1" stroke-width="18" stroke-linecap="round" filter="url(#roughen)"/>
        <path d="M304 620 C334 616, 358 614, 382 612" fill="none" stroke="#f1ddc1" stroke-width="18" stroke-linecap="round" filter="url(#roughen)"/>
        <path d="M332 230 C338 306, 338 366, 336 432" fill="none" stroke="#f1ddc1" stroke-width="18" stroke-linecap="round" filter="url(#roughen)"/>
        <path d="M332 610 C336 674, 337 736, 336 806" fill="none" stroke="#f1ddc1" stroke-width="16" stroke-linecap="round" filter="url(#roughen)"/>

        <!-- labels like hand-written notes -->
        <g filter="url(#softShadow)">
          <path d="M286 52 Q290 44 300 45 L386 45 Q396 45 398 55 L398 105 Q397 114 387 116 L298 116 Q290 115 286 106 Z"
                fill="#eef3fb" stroke="#aabade" stroke-width="2.5" filter="url(#roughen)"/>
          <text x="342" y="73" font-size="12" text-anchor="middle" fill="#4d6486" font-weight="700">駅方面</text>
          <text x="342" y="92" font-size="11" text-anchor="middle" fill="#6d84a6">曳舟 / 京成曳舟</text>
        </g>

        <g filter="url(#softShadow)">
          <path d="M300 468 Q306 458 318 458 L386 458 Q396 458 397 470 L397 528 Q397 540 384 542 L314 542 Q303 541 299 530 Z"
                fill="#eef8ea" stroke="#9bc290" stroke-width="2.5" filter="url(#roughen)"/>
          <text x="348" y="488" font-size="12" text-anchor="middle" fill="#55704c" font-weight="700">京島南公園</text>
          <text x="348" y="507" font-size="10" text-anchor="middle" fill="#6f8667">ランドマーク</text>
        </g>

        <g filter="url(#softShadow)">
          <path d="M34 744 Q40 736 52 736 L142 736 Q152 736 153 748 L153 802 Q152 814 140 816 L50 816 Q39 815 34 804 Z"
                fill="#fff5f5" stroke="#ddb1b1" stroke-width="2.5" filter="url(#roughen)"/>
          <text x="94" y="765" font-size="12" text-anchor="middle" fill="#8a5d5d" font-weight="700">病院・医療施設側</text>
          <text x="94" y="784" font-size="10" text-anchor="middle" fill="#9a7272">要調整</text>
        </g>

        <g filter="url(#softShadow)">
          <path d="M30 84 Q36 74 48 74 L112 74 Q122 74 123 84 L123 132 Q122 142 112 144 L46 144 Q34 143 30 132 Z"
                fill="#fffdf9" stroke="#ead6c1" stroke-width="2.5" filter="url(#roughen)"/>
          <text x="76" y="103" font-size="12" text-anchor="middle" fill="#6b5646" font-weight="700">入口の通り</text>
          <text x="76" y="121" font-size="10" text-anchor="middle" fill="#8a7668">商店街の入口側</text>
        </g>

        <g filter="url(#softShadow)">
          <path d="M38 532 Q44 522 56 522 L120 522 Q131 522 133 533 L133 582 Q132 592 120 594 L54 594 Q44 593 39 584 Z"
                fill="#fffdf9" stroke="#ead6c1" stroke-width="2.5" filter="url(#roughen)"/>
          <text x="86" y="551" font-size="12" text-anchor="middle" fill="#6b5646" font-weight="700">学校 / 神社側</text>
          <text x="86" y="569" font-size="10" text-anchor="middle" fill="#8a7668">左側ランドマーク</text>
        </g>

        <g filter="url(#softShadow)">
          <path d="M312 830 Q318 822 328 822 L386 822 Q395 822 396 832 L396 876 Q395 886 385 888 L326 888 Q316 887 312 878 Z"
                fill="#fffdf9" stroke="#ead6c1" stroke-width="2.5" filter="url(#roughen)"/>
          <text x="354" y="849" font-size="12" text-anchor="middle" fill="#6b5646" font-weight="700">八広方面</text>
          <text x="354" y="867" font-size="10" text-anchor="middle" fill="#8a7668">奥側の目印</text>
        </g>

        <!-- handwritten zone tags -->
        <g fill="#fffdfa" stroke="#e8d5c1" stroke-width="2" filter="url(#roughen)">
          <path d="M248 120 Q252 112 260 112 L318 112 Q326 112 328 120 L328 144 Q327 152 318 154 L260 154 Q252 153 248 145 Z"/>
          <path d="M214 402 Q220 394 230 394 L298 394 Q308 394 310 404 L310 430 Q309 438 298 440 L230 440 Q220 439 214 432 Z"/>
          <path d="M248 724 Q252 716 260 716 L318 716 Q326 716 328 724 L328 748 Q327 756 318 758 L260 758 Q252 757 248 749 Z"/>
        </g>
        <text x="288" y="137" font-size="11" text-anchor="middle" fill="#795c45" font-weight="700">入口寄り</text>
        <text x="262" y="421" font-size="11" text-anchor="middle" fill="#795c45" font-weight="700">中央あたり</text>
        <text x="288" y="741" font-size="11" text-anchor="middle" fill="#795c45" font-weight="700">奥側</text>
      </svg>
    </div>

    <div class="legend">
      <span>画用紙に描いた案内図の方向へ寄せる</span>
      <span>次に店を道沿いへ戻す</span>
      <span>地形は Googleマップのスクショを下敷きにする</span>
    </div>
  </div>
</body>
</html>
