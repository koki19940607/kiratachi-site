<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>キラキラ橘商店街 地図プロトタイプ</title>
  <style>
    :root {
      --bg: #f7f2ea;
      --paper: #fffdf9;
      --text: #2d2621;
      --sub: #6b625a;
      --line: #ead8c8;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .app {
      max-width: 430px;
      margin: 0 auto;
      padding: 18px 14px 40px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 24px;
      line-height: 1.3;
    }
    .lead {
      margin: 0 0 14px;
      color: var(--sub);
      font-size: 13px;
      line-height: 1.7;
    }
    .map-card {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 14px 36px rgba(84, 48, 21, 0.08);
    }
    .map-frame {
      width: 100%;
      display: block;
      background: linear-gradient(180deg, #fffaf4, #fff3e8);
    }
    .legend {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
    }
    .legend span {
      font-size: 11px;
      color: var(--sub);
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 6px 10px;
    }
  </style>
</head>
<body>
  <div class="app">
    <h1>商店街地図プロトタイプ</h1>
    <p class="lead">サンプルの案内図の雰囲気に寄せるため、CSSの箱ではなく SVG で描く方式に切り替えた試作です。まずは地形・道・ランドマークの見た目を整えています。</p>

    <div class="map-card">
      <svg class="map-frame" viewBox="0 0 430 980" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="キラキラ橘商店街の案内図プロトタイプ">
        <defs>
          <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#8d5e39" flood-opacity="0.10"/>
          </filter>
        </defs>

        <rect x="0" y="0" width="430" height="980" fill="#fff7ef"/>
        <path d="M350 40 C390 160, 392 260, 386 360 C380 470, 390 600, 394 760 C396 850, 388 930, 382 980 L430 980 L430 0 L350 0 Z" fill="#dff2fb"/>
        <path d="M352 40 C392 160, 394 260, 388 360 C382 470, 392 600, 396 760 C398 850, 390 930, 384 980" fill="none" stroke="#98c6de" stroke-width="4"/>

        <path d="M215 90 C235 120, 250 165, 256 225 C262 285, 255 350, 250 420 C246 490, 258 565, 272 635 C286 705, 292 782, 292 870" fill="none" stroke="#d5b797" stroke-width="52" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M215 90 C235 120, 250 165, 256 225 C262 285, 255 350, 250 420 C246 490, 258 565, 272 635 C286 705, 292 782, 292 870" fill="none" stroke="#f7e2c7" stroke-width="38" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M230 120 C242 160, 248 215, 246 270 C245 320, 240 380, 240 430 C241 500, 252 570, 266 640 C278 710, 282 780, 282 850" fill="none" stroke="#fff8ef" stroke-width="4" stroke-dasharray="8 10" stroke-linecap="round"/>

        <path d="M70 180 C128 170, 178 164, 232 154" fill="none" stroke="#f2dfc7" stroke-width="24" stroke-linecap="round"/>
        <path d="M98 315 C146 308, 196 298, 245 288" fill="none" stroke="#f2dfc7" stroke-width="22" stroke-linecap="round"/>
        <path d="M66 470 C132 458, 188 448, 244 438" fill="none" stroke="#f2dfc7" stroke-width="24" stroke-linecap="round"/>
        <path d="M112 640 C168 630, 220 622, 276 612" fill="none" stroke="#f2dfc7" stroke-width="22" stroke-linecap="round"/>
        <path d="M150 815 C200 808, 244 804, 292 800" fill="none" stroke="#f2dfc7" stroke-width="20" stroke-linecap="round"/>
        <path d="M290 430 C332 426, 360 420, 382 418" fill="none" stroke="#f2dfc7" stroke-width="18" stroke-linecap="round"/>
        <path d="M300 622 C336 618, 360 616, 382 614" fill="none" stroke="#f2dfc7" stroke-width="18" stroke-linecap="round"/>
        <path d="M328 245 C338 310, 340 368, 338 430" fill="none" stroke="#f2dfc7" stroke-width="18" stroke-linecap="round"/>
        <path d="M330 620 C334 680, 336 742, 336 808" fill="none" stroke="#f2dfc7" stroke-width="16" stroke-linecap="round"/>

        <g filter="url(#shadow)">
          <rect x="286" y="58" width="104" height="58" rx="18" fill="#edf2fb" stroke="#adc0e1" stroke-width="2"/>
          <text x="338" y="82" font-size="12" text-anchor="middle" fill="#4f6388" font-weight="700">駅方面</text>
          <text x="338" y="99" font-size="11" text-anchor="middle" fill="#6b7ea0">曳舟 / 京成曳舟</text>
        </g>

        <g filter="url(#shadow)">
          <rect x="300" y="486" width="90" height="58" rx="18" fill="#e7f4e3" stroke="#9fc894" stroke-width="2"/>
          <text x="345" y="509" font-size="12" text-anchor="middle" fill="#55704c" font-weight="700">京島南公園</text>
          <text x="345" y="526" font-size="10" text-anchor="middle" fill="#698162">ランドマーク</text>
        </g>

        <g filter="url(#shadow)">
          <rect x="42" y="748" width="104" height="58" rx="18" fill="#fff2f2" stroke="#ddb0b0" stroke-width="2"/>
          <text x="94" y="771" font-size="12" text-anchor="middle" fill="#8b5a5a" font-weight="700">病院・医療施設側</text>
          <text x="94" y="788" font-size="10" text-anchor="middle" fill="#987070">要調整</text>
        </g>

        <g filter="url(#shadow)">
          <rect x="28" y="84" width="90" height="54" rx="18" fill="#fffdf9" stroke="#ecd8c4" stroke-width="2"/>
          <text x="73" y="106" font-size="12" text-anchor="middle" fill="#6b5646" font-weight="700">入口の通り</text>
          <text x="73" y="123" font-size="10" text-anchor="middle" fill="#8a7668">商店街の入口側</text>
        </g>

        <g filter="url(#shadow)">
          <rect x="36" y="540" width="88" height="54" rx="18" fill="#fffdf9" stroke="#ecd8c4" stroke-width="2"/>
          <text x="80" y="562" font-size="12" text-anchor="middle" fill="#6b5646" font-weight="700">学校 / 神社側</text>
          <text x="80" y="579" font-size="10" text-anchor="middle" fill="#8a7668">左側ランドマーク</text>
        </g>

        <g filter="url(#shadow)">
          <rect x="312" y="830" width="82" height="50" rx="18" fill="#fffdf9" stroke="#ecd8c4" stroke-width="2"/>
          <text x="353" y="851" font-size="12" text-anchor="middle" fill="#6b5646" font-weight="700">八広方面</text>
          <text x="353" y="867" font-size="10" text-anchor="middle" fill="#8a7668">奥側の目印</text>
        </g>

        <g>
          <rect x="244" y="116" width="74" height="28" rx="14" fill="rgba(255,255,255,0.94)" stroke="#ead7c4"/>
          <text x="281" y="134" font-size="11" text-anchor="middle" fill="#7a5a42" font-weight="700">入口寄り</text>

          <rect x="210" y="404" width="86" height="28" rx="14" fill="rgba(255,255,255,0.94)" stroke="#ead7c4"/>
          <text x="253" y="422" font-size="11" text-anchor="middle" fill="#7a5a42" font-weight="700">中央あたり</text>

          <rect x="244" y="724" width="74" height="28" rx="14" fill="rgba(255,255,255,0.94)" stroke="#ead7c4"/>
          <text x="281" y="742" font-size="11" text-anchor="middle" fill="#7a5a42" font-weight="700">奥側</text>
        </g>
      </svg>
    </div>

    <div class="legend">
      <span>地形を案内図イラストで描く</span>
      <span>次に店を道沿いに載せる</span>
      <span>最後に本体へ統合</span>
    </div>
  </div>
</body>
</html>
