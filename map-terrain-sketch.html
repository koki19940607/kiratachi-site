<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>キラキラ橘商店街 地形スケッチ</title>
  <style>
    :root {
      --bg: #f7f2ea;
      --paper: #fffdf9;
      --text: #2d2621;
      --sub: #6b625a;
      --line: #e8d8c8;
      --road: #d4d0c9;
      --road-edge: #b9b0a4;
      --land: #fff7ef;
      --park: #dff3dc;
      --park-edge: #9ac594;
      --station: #e8f0ff;
      --station-edge: #9db7e8;
      --hospital: #fff0f0;
      --hospital-edge: #e0aaaa;
      --label: rgba(255,255,255,0.92);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .app { max-width: 430px; margin: 0 auto; padding: 18px 14px 40px; }
    h1 { margin: 0 0 8px; font-size: 24px; }
    .lead { margin: 0 0 14px; color: var(--sub); font-size: 13px; line-height: 1.6; }
    .map-wrap {
      position: relative;
      width: 100%;
      height: 900px;
      background: linear-gradient(180deg, #fffaf4, #fff3e8);
      border: 1px solid var(--line);
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 14px 36px rgba(84, 48, 21, 0.08);
    }
    .block {
      position: absolute;
      background: var(--land);
      border: 1px solid #efdfd0;
      border-radius: 18px;
    }
    .road {
      position: absolute;
      background: linear-gradient(180deg, var(--road), #c9c3bb);
      border: 2px solid var(--road-edge);
      border-radius: 22px;
    }
    .road.main {
      left: 43%;
      top: 8%;
      width: 16%;
      height: 74%;
      transform: rotate(26deg);
      transform-origin: center center;
    }
    .road.side-east {
      left: 73%;
      top: 18%;
      width: 10%;
      height: 60%;
    }
    .road.cross-1 { left: 8%; top: 18%; width: 50%; height: 4.5%; transform: rotate(-26deg); }
    .road.cross-2 { left: 20%; top: 31%; width: 43%; height: 4.2%; transform: rotate(-24deg); }
    .road.cross-3 { left: 12%; top: 46%; width: 50%; height: 4.2%; transform: rotate(-22deg); }
    .road.cross-4 { left: 18%; top: 61%; width: 49%; height: 4.2%; transform: rotate(-18deg); }
    .road.cross-5 { left: 26%; top: 76%; width: 44%; height: 4.2%; transform: rotate(-10deg); }
    .park, .station, .hospital, .landmark {
      position: absolute;
      border-radius: 18px;
      padding: 10px 10px;
      font-size: 11px;
      line-height: 1.45;
      color: #5d4a3c;
      background: var(--label);
      border: 1px solid #e7d7c8;
      box-shadow: 0 6px 12px rgba(84, 48, 21, 0.05);
    }
    .park {
      background: linear-gradient(180deg, var(--park), #edf8ea);
      border-color: var(--park-edge);
    }
    .station {
      background: linear-gradient(180deg, var(--station), #f2f6ff);
      border-color: var(--station-edge);
    }
    .hospital {
      background: linear-gradient(180deg, var(--hospital), #fff7f7);
      border-color: var(--hospital-edge);
    }
    .zone-label {
      position: absolute;
      font-size: 11px;
      font-weight: 800;
      color: #7a5a42;
      background: rgba(255,255,255,0.94);
      border: 1px solid #edd8c4;
      padding: 6px 10px;
      border-radius: 999px;
    }
    .zone-1 { left: 56%; top: 7%; }
    .zone-2 { left: 38%; top: 41%; }
    .zone-3 { left: 47%; top: 74%; }
    .legend { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
    .legend span {
      font-size: 11px;
      color: var(--sub);
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 6px 10px;
    }
  </style>
</head>
<body>
  <div class="app">
    <h1>地形スケッチ</h1>
    <p class="lead">店の位置はまだ置かず、Googleマップのスクショを見ながら、主通路・枝道・ランドマークだけを先に描いた地形ラフです。</p>
    <div class="map-wrap">
      <div class="block" style="left:4%;top:6%;width:25%;height:18%"></div>
      <div class="block" style="left:6%;top:28%;width:23%;height:17%"></div>
      <div class="block" style="left:6%;top:49%;width:24%;height:18%"></div>
      <div class="block" style="left:10%;top:72%;width:27%;height:16%"></div>
      <div class="block" style="left:64%;top:7%;width:28%;height:15%"></div>
      <div class="block" style="left:63%;top:28%;width:29%;height:15%"></div>
      <div class="block" style="left:61%;top:47%;width:31%;height:18%"></div>
      <div class="block" style="left:60%;top:70%;width:31%;height:18%"></div>
      <div class="block" style="left:31%;top:22%;width:18%;height:10%"></div>
      <div class="block" style="left:31%;top:58%;width:18%;height:10%"></div>

      <div class="road main"></div>
      <div class="road side-east"></div>
      <div class="road cross-1"></div>
      <div class="road cross-2"></div>
      <div class="road cross-3"></div>
      <div class="road cross-4"></div>
      <div class="road cross-5"></div>

      <div class="zone-label zone-1">入口寄り</div>
      <div class="zone-label zone-2">中央あたり</div>
      <div class="zone-label zone-3">奥側</div>

      <div class="park" style="left:56%;top:58%;width:26%;">京島南公園</div>
      <div class="station" style="left:70%;top:3%;width:20%;">駅方面（曳舟 / 京成曳舟側）</div>
      <div class="hospital" style="left:8%;top:82%;width:24%;">病院・医療施設側（要確認）</div>
      <div class="landmark" style="left:63%;top:84%;width:22%;">八広方面</div>
      <div class="landmark" style="left:8%;top:12%;width:18%;">入口の通り</div>
    </div>
    <div class="legend">
      <span>まず地形だけ合わせる</span>
      <span>次に店を道沿いへ配置</span>
      <span>最後に見た目を整える</span>
    </div>
  </div>
</body>
</html>
